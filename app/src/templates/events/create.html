{% extends "base.html" %}

{% block title %}Create Event - MaScan{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-header">
        <h1>Create Event</h1>
        <p>Add a new event to the system</p>
    </div>

    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="POST" class="form">
        <div class="form-group">
            <label for="name">Event Name *</label>
            <input type="text" id="name" name="name" required placeholder="e.g., Team Meeting, Training Session">
        </div>

        <div class="form-group">
            <label for="date">Event Date *</label>
            <input type="date" id="date" name="date" required>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="4" placeholder="Add any relevant details about this event"></textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Create Event</button>
            <a href="{{ url_for('event.list_events') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>

<style>
.form-container {
    max-width: 600px;
    margin: 0 auto;
    background: white;
    padding: 30px;
    border-radius: 8px;
}

.form-header {
    margin-bottom: 30px;
}

.form-header h1 {
    margin: 0 0 10px 0;
}

.form-header p {
    margin: 0;
    color: #666;
}

.form {
    display: flex;
    flex-direction: column;
}

.form-group {
    margin-bottom: 20px;
    display: flex;
    flex-direction: column;
}

.form-group label {
    margin-bottom: 8px;
    font-weight: 600;
    color: #333;
}

.form-group input,
.form-group textarea {
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-size: 1em;
    font-family: inherit;
}

.form-group input:focus,
.form-group textarea:focus {
    outline: none;
    border-color: #2A73FF;
    box-shadow: 0 0 0 3px rgba(42, 115, 255, 0.1);
}

.form-actions {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

.form-actions .btn {
    flex: 1;
}
</style>
{% endblock %}
