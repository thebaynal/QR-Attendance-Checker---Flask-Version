{% extends "base.html" %}

{% block title %}Edit Event - MaScan{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-header">
        <h1>Edit Event</h1>
    </div>

    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="POST" class="form">
        <div class="form-group">
            <label for="name">Event Name *</label>
            <input type="text" id="name" name="name" value="{{ event[1] }}" required>
        </div>

        <div class="form-group">
            <label for="date">Event Date *</label>
            <input type="date" id="date" name="date" value="{{ event[2] }}" required>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="4">{{ event[3] if event[3] else '' }}</textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{{ url_for('event.view_event', event_id=event[0]) }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>

<style>
.form-container {
    max-width: 600px;
    margin: 0 auto;
    background: white;
    padding: 30px;
    border-radius: 8px;
}

.form-header {
    margin-bottom: 30px;
}

.form-header h1 {
    margin: 0 0 10px 0;
}

.form-group {
    margin-bottom: 20px;
    display: flex;
    flex-direction: column;
}

.form-group label {
    margin-bottom: 8px;
    font-weight: 600;
    color: #333;
}

.form-group input,
.form-group textarea {
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-size: 1em;
    font-family: inherit;
}

.form-group input:focus,
.form-group textarea:focus {
    outline: none;
    border-color: #2A73FF;
    box-shadow: 0 0 0 3px rgba(42, 115, 255, 0.1);
}

.form-actions {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

.form-actions .btn {
    flex: 1;
}
</style>
{% endblock %}
