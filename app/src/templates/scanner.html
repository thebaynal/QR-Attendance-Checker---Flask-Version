{% extends "base.html" %}

{% block title %}QR Scanner - MaScan{% endblock %}

{% block content %}
<div class="scanner-container">
    <h1>QR Code Scanner</h1>

    <div class="scanner-setup">
        <div class="form-group">
            <label for="event-select">Select Event</label>
            <select id="event-select" required>
                <option value="">-- Choose an event --</option>
                {% for event in events %}
                <option value="{{ event[0] }}">{{ event[1] }} ({{ event[2] }})</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="time-slot">Time Slot</label>
            <select id="time-slot">
                <option value="morning">Morning</option>
                <option value="afternoon">Afternoon</option>
                <option value="evening">Evening</option>
            </select>
        </div>
    </div>

    <div class="scanner-area">
        <div id="qr-reader" style="width: 100%; max-width: 500px; margin: 0 auto;"></div>
        <div id="scanner-status" class="scanner-status">Ready to scan...</div>
    </div>

    <div class="scanner-input">
        <input type="text" id="qr-input" placeholder="Or paste QR code data here" autofocus>
        <button type="button" id="submit-btn" class="btn btn-primary">Submit</button>
    </div>

    <div id="result-message" class="result-message"></div>

    <div class="marked-list">
        <h2>Marked Attendees</h2>
        <table id="attendance-table" class="table">
            <thead>
                <tr>
                    <th>Employee ID</th>
                    <th>Name</th>
                    <th>Marked At</th>
                </tr>
            </thead>
            <tbody id="attendance-body">
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.2.0/jsQR.js"></script>
<script src="{{ url_for('static', filename='js/scanner.js') }}"></script>

<style>
.scanner-container {
    max-width: 800px;
    margin: 0 auto;
}

.scanner-container h1 {
    text-align: center;
    margin-bottom: 30px;
}

.scanner-setup {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    margin-bottom: 30px;
    background: white;
    padding: 20px;
    border-radius: 8px;
}

.form-group {
    display: flex;
    flex-direction: column;
}

.form-group label {
    margin-bottom: 5px;
    font-weight: 600;
    color: #333;
}

.form-group select {
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-size: 1em;
}

.scanner-area {
    background: white;
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 20px;
    text-align: center;
}

#qr-reader {
    border: 2px solid #2A73FF;
    border-radius: 8px;
    overflow: hidden;
}

.scanner-status {
    margin-top: 15px;
    padding: 10px;
    background: #e3f2fd;
    color: #0d47a1;
    border-radius: 4px;
    text-align: center;
}

.scanner-input {
    display: flex;
    gap: 10px;
    margin-bottom: 30px;
}

.scanner-input input {
    flex: 1;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-size: 1em;
}

.scanner-input input:focus {
    outline: none;
    border-color: #2A73FF;
    box-shadow: 0 0 0 3px rgba(42, 115, 255, 0.1);
}

#submit-btn {
    padding: 10px 20px;
}

.result-message {
    margin-bottom: 20px;
    padding: 15px;
    border-radius: 4px;
    display: none;
}

.result-message.success {
    display: block;
    background: #d4edda;
    color: #155724;
    border: 1px solid #c3e6cb;
}

.result-message.error {
    display: block;
    background: #f8d7da;
    color: #721c24;
    border: 1px solid #f5c6cb;
}

.marked-list {
    background: white;
    border-radius: 8px;
    padding: 20px;
}

.marked-list h2 {
    margin-top: 0;
}

.marked-list table {
    width: 100%;
    border-collapse: collapse;
}

.marked-list th {
    background: #f5f5f5;
    padding: 12px;
    text-align: left;
    font-weight: 600;
    border-bottom: 2px solid #e0e0e0;
}

.marked-list td {
    padding: 12px;
    border-bottom: 1px solid #e0e0e0;
}

.marked-list tbody tr:hover {
    background: #f9f9f9;
}
</style>
{% endblock %}
