{% extends "base.html" %}



{% block title %}QR Scanner - MaScan{% endblock %}



{% block content %}

<div class="scanner-container">

    <h1>QR Code Scanner</h1>
    <p class="scanner-subtitle">Fast, focused attendance marking for live events</p>



    <div class="scanner-setup">

        <div class="form-group">

            <label for="event-select">Select Event</label>

            <select id="event-select" required>

                <option value="">-- Choose an event --</option>

                {% for event in events %}

                <option value="{{ event[0] }}">{{ event[1] }} ({{ event[2] }})</option>

                {% endfor %}

            </select>

        </div>



        <div class="form-group">

            <label for="time-slot">Time Slot</label>

            <select id="time-slot">

                <option value="morning">Morning</option>

                <option value="afternoon">Afternoon</option>

                <option value="lunch">Lunch</option>

            </select>

        </div>

    </div>



    <div class="scanner-main-layout">

        <!-- Left: Scanner Area -->

        <div class="scanner-left">

            <div class="scanner-area">

                <div class="scanner-panel-header">
                    <h2><i class="fa-solid fa-qrcode" aria-hidden="true"></i> Live Scanner</h2>
                    <span class="scan-pill">Real-time</span>
                </div>

                <div id="qr-reader" style="width: 100%; max-width: 500px; margin: 0 auto;"></div>

                <div class="scanner-controls">
                    <label for="camera-select" class="camera-select-label" style="display: none;">Camera</label>
                    <select id="camera-select" class="camera-select" style="display: none;" aria-label="Select camera"></select>
                    <button id="switch-camera-btn" class="btn btn-secondary btn-small" style="display: none;">
                        <i class="fa-solid fa-rotate" aria-hidden="true"></i> Switch Camera
                    </button>
                    <button id="native-scan-btn" class="btn btn-primary btn-small" style="display: none; margin-left: 8px;">
                        <i class="fa-solid fa-camera" aria-hidden="true"></i> Use Native Scanner
                    </button>
                    <div id="scanner-status" class="scanner-status">Ready to scan...</div>
                </div>

                <div id="last-scanned-indicator" class="last-scanned-indicator" style="display: none;"></div>

            </div>



            <details class="advanced-panel">
                <summary><i class="fa-solid fa-sliders" aria-hidden="true"></i> Manual / fallback input</summary>

            <div class="scanner-input">

                <input type="text" id="qr-input" placeholder="Or paste QR code data here" autofocus>

                <button type="button" id="submit-btn" class="btn btn-primary">Submit</button>

            </div>
            </details>



            <div id="result-message" class="result-message"></div>

        </div>



        <!-- Right: Attendance List -->

        <div class="scanner-right">

            <div class="marked-list">

                <div class="attendance-header">

                    <h2>Marked Attendees</h2>

                    <div class="attendance-counter">

                        <span class="counter-label">Total:</span>

                        <span class="counter-value" id="attendance-count">0</span>

                    </div>

                </div>

                <table id="attendance-table" class="table">

                    <thead>

                        <tr>

                            <th>ID Number</th>

                            <th>Name</th>

                            <th>Marked At</th>

                        </tr>

                    </thead>

                    <tbody id="attendance-body">

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>



<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

<script src="{{ url_for('static', filename='js/scanner.js') }}"></script>



<style>
    .scanner-container {

        max-width: 1320px;

        margin: 0 auto;

    }

    .scanner-subtitle {
        text-align: center;
        margin: -12px 0 24px;
        color: var(--text-secondary);
        font-size: 0.92em;
    }



    .scanner-container h1 {

        text-align: center;

        margin-bottom: 28px;

        font-size: 1.8em;

        font-weight: 700;

        background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));

        -webkit-background-clip: text;

        -webkit-text-fill-color: transparent;

        background-clip: text;

    }



    .scanner-main-layout {

        display: grid;

        grid-template-columns: 1fr 1fr;

        gap: 20px;

        align-items: start;

    }



    .scanner-left {

        display: flex;

        flex-direction: column;

        gap: 15px;

    }



    .scanner-right {

        position: sticky;

        top: 20px;

    }



    .scanner-setup {

        display: grid;

        grid-template-columns: 1fr 1fr;

        gap: 15px;

        margin-bottom: 24px;

        background: var(--card-bg);

        padding: 20px;

        border-radius: var(--border-radius);

        box-shadow: var(--shadow);

        border: 1px solid var(--border-color);

    }



    .form-group {

        display: flex;

        flex-direction: column;

        animation: fadeIn 0.4s ease-out;

    }



    .form-group label {

        margin-bottom: 5px;

        font-weight: 600;

        color: var(--text-color);

    }



    .form-group select {

        padding: 10px;

        border: 1px solid var(--input-border);

        border-radius: 4px;

        font-size: 1em;

        background: var(--input-bg);

        color: var(--text-color);

        transition: var(--transition);

    }



    .form-group select:focus {

        outline: none;

        border-color: var(--primary-color);

        box-shadow: var(--focus-ring);

    }



    .scanner-area {

        background: var(--card-bg);

        border-radius: var(--border-radius);

        padding: 20px 20px 14px;

        margin-bottom: 20px;

        text-align: center;

        box-shadow: var(--shadow);

        border: 1px solid var(--border-color);

    }

    .scanner-panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
    }

    .scanner-panel-header h2 {
        margin: 0;
        font-size: 1.05em;
        color: var(--text-color);
        display: inline-flex;
        gap: 8px;
        align-items: center;
    }

    .scan-pill {
        padding: 5px 10px;
        border-radius: 999px;
        border: 1px solid rgba(16, 185, 129, 0.3);
        background: rgba(16, 185, 129, 0.08);
        color: var(--success-color);
        font-size: 0.78em;
        font-weight: 600;
    }



    #qr-reader {

        border: 3px solid var(--primary-color);

        border-radius: 8px;

        overflow: hidden;

        animation: scannerGlow 2.8s ease-in-out infinite;

    }

    @keyframes scannerGlow {
        0%,
        100% {
            box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.12);
        }

        50% {
            box-shadow: 0 0 0 7px rgba(37, 99, 235, 0.02);
        }
    }



    .scanner-controls {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-top: 15px;
    }

    .camera-select-label {
        font-size: 0.85em;
        color: var(--text-secondary);
        font-weight: 600;
    }

    .camera-select {
        min-width: 230px;
        padding: 10px 12px;
        border: 1.5px solid var(--input-border);
        border-radius: var(--border-radius);
        background: var(--input-bg);
        color: var(--text-color);
        font-size: 0.9em;
    }

    .camera-select:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: var(--focus-ring);
    }

    #switch-camera-btn {
        min-width: 170px;
        display: none;
        /* Only show when scanner is active */
    }

    #native-scan-btn {
        min-width: 190px;
    }

    #switch-camera-btn i,
    #native-scan-btn i {
        margin-right: 6px;
        font-size: 0.9em;
    }

    .scanner-status {

        padding: 12px;

        background: var(--primary-light);

        color: var(--primary-color);

        border-radius: var(--border-radius-sm);

        text-align: center;

        border-left: 3px solid var(--primary-color);
        width: 100%;
        font-size: 0.9em;
        font-weight: 500;

    }

    .advanced-panel {
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        border-radius: var(--border-radius);
        padding: 12px 14px;
        margin-bottom: 8px;
    }

    .advanced-panel summary {
        cursor: pointer;
        list-style: none;
        color: var(--text-secondary);
        font-weight: 600;
        font-size: 0.88em;
        display: inline-flex;
        align-items: center;
        gap: 8px;
    }

    .advanced-panel[open] summary {
        margin-bottom: 10px;
    }



    .scanner-input {

        display: flex;

        gap: 10px;

        margin-bottom: 0;

        animation: slideInUp 0.5s ease-out 0.2s backwards;

    }



    .scanner-input input {

        flex: 1;

        padding: 12px;

        border: 2px solid var(--input-border);

        border-radius: 4px;

        font-size: 1em;

        background: var(--input-bg);

        color: var(--text-color);

        transition: var(--transition);

    }



    .scanner-input input::placeholder {

        color: var(--navbar-text);

    }



    .scanner-input input:focus {

        outline: none;

        border-color: var(--primary-color);

        box-shadow: var(--focus-ring);

        transform: translateY(-2px);

    }



    #submit-btn {

        padding: 12px 24px;

    }



    .result-message {

        margin-bottom: 20px;

        padding: 15px;

        border-radius: 4px;

        display: none;

        animation: slideInDown 0.3s ease-out;

        border-left: 4px solid transparent;

    }



    .result-message.success {

        display: block;

        background: rgba(16, 185, 129, 0.08);

        color: var(--success-color);

        border-left-color: var(--success-color);

    }



    .result-message.error {

        display: block;

        background: rgba(239, 68, 68, 0.08);

        color: var(--danger-color);

        border-left-color: var(--danger-color);

    }



    .result-message.warning {

        display: block;

        background: rgba(245, 158, 11, 0.08);

        color: #D97706;

        border-left-color: #D97706;

    }



    .scanned-success {

        padding: 20px;

        border-radius: 8px;

        font-weight: 600;

        animation: slideInDown 0.4s ease-out, scaleIn 0.3s ease-out !important;

    }



    .scan-success-content {

        display: flex;

        align-items: center;

        gap: 15px;

    }



    .scan-success-icon {

        font-size: 2.5em;

        font-weight: bold;

        animation: popIn 0.4s ease-out;

    }



    .scan-success-text {

        text-align: left;

    }



    .scan-success-text strong {

        font-size: 1.1em;

        display: block;

        margin-bottom: 5px;

    }



    .scan-success-text p {

        margin: 3px 0;

        font-size: 0.9em;

        opacity: 0.9;

    }



    .scan-time {

        font-size: 0.85em !important;

        opacity: 0.7 !important;

    }



    .already-scanned {

        padding: 20px;

        border-radius: 8px;

        font-weight: 600;

        animation: slideInDown 0.4s ease-out, pulse-warning 0.6s ease-in-out !important;

    }



    .already-scanned-content {

        display: flex;

        align-items: center;

        gap: 15px;

    }



    .already-scanned-icon {

        font-size: 2.5em;

        animation: shake 0.5s ease-in-out;

    }



    .already-scanned-text {

        text-align: left;

    }



    .already-scanned-text strong {

        font-size: 1.1em;

        display: block;

        margin-bottom: 5px;

    }



    .already-scanned-text p {

        margin: 3px 0;

        font-size: 0.9em;

        opacity: 0.9;

    }



    @keyframes popIn {

        0% {

            transform: scale(0.3) rotateZ(-45deg);

            opacity: 0;

        }

        50% {

            transform: scale(1.1) rotateZ(5deg);

        }

        100% {

            transform: scale(1) rotateZ(0);

            opacity: 1;

        }

    }



    @keyframes shake {

        0%,
        100% {
            transform: translateX(0);
        }

        25% {
            transform: translateX(-10px);
        }

        75% {
            transform: translateX(10px);
        }

    }



    @keyframes scaleIn {

        0% {

            transform: scale(0.8);

            opacity: 0;

        }

        100% {

            transform: scale(1);

            opacity: 1;

        }

    }



    @keyframes pulse-warning {

        0%,
        100% {

            box-shadow: 0 0 0 0 rgba(255, 111, 0, 0.7);

        }

        50% {

            box-shadow: 0 0 0 10px rgba(255, 111, 0, 0);

        }

    }



    @keyframes slideInRow {

        from {

            opacity: 0;

            transform: translateY(-10px);

        }

        to {

            opacity: 1;

            transform: translateY(0);

        }

    }



    .new-scan-row {

        background: rgba(16, 185, 129, 0.06);

    }



    @keyframes slideInRight {

        from {

            opacity: 0;

            transform: translateX(20px);

        }

        to {

            opacity: 1;

            transform: translateX(0);

        }

    }



    .marked-list {

        background: var(--card-bg);

        border-radius: var(--border-radius);

        padding: 20px;

        box-shadow: var(--shadow);

        border: 1px solid var(--border-color);

        max-height: 600px;

        overflow-y: auto;

        display: flex;

        flex-direction: column;

    }



    .marked-list h2 {

        margin-top: 0;

        color: var(--text-color);

    }



    .attendance-header {

        display: flex;

        flex-direction: column;

        gap: 12px;

        padding-bottom: 15px;

        border-bottom: 2px solid var(--border-color);

        margin-bottom: 15px;

    }



    .attendance-header h2 {

        margin: 0;

        font-size: 1.2em;

    }



    .attendance-counter {

        display: flex;

        align-items: center;

        justify-content: center;

        gap: 8px;

        padding: 12px 16px;

        background: rgba(16, 185, 129, 0.08);

        border-radius: 99px;

        border: 1.5px solid rgba(16, 185, 129, 0.25);

        width: 100%;

    }



    .counter-label {

        font-weight: 600;

        color: var(--text-secondary);

        font-size: 0.88em;

    }



    .counter-value {

        font-size: 1.6em;

        font-weight: 700;

        color: var(--success-color);

        min-width: 40px;

        text-align: center;

    }



    .marked-list table {

        width: 100%;

        border-collapse: collapse;

    }



    .marked-list tbody tr {

        animation: fadeIn 0.3s ease-out;

    }



    .marked-list tbody tr:hover {

        background: var(--table-hover);

        transform: scale(1.01);

    }



    .last-scanned-indicator {

        margin-top: 12px;

        padding: 11px 14px;

        background: rgba(16, 185, 129, 0.06);

        border-left: 3px solid var(--success-color);

        border-radius: var(--border-radius-sm);

        border: 1px solid rgba(16, 185, 129, 0.2);

        font-weight: 600;

        color: var(--success-color);
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.88em;

    }

    .last-scanned-indicator i {
        width: 16px;
        text-align: center;
        flex-shrink: 0;
    }



    .last-scanned-indicator.warning {

        background: rgba(245, 158, 11, 0.06);

        color: #D97706;

        border-left-color: #D97706;

    }



    @media (max-width: 1024px) {

        .scanner-main-layout {

            grid-template-columns: 1fr;

            gap: 15px;

        }



        .scanner-right {

            position: static;

        }

    }



    @media (max-width: 600px) {

        .scanner-setup {

            grid-template-columns: 1fr;

        }



        .scanner-container h1 {

            font-size: 1.5em;

        }



        .scanner-input {

            flex-direction: column;

        }

        .scanner-controls {
            justify-content: stretch;
        }

        .camera-select {
            width: 100%;
            min-width: 0;
        }

        #switch-camera-btn,
        #native-scan-btn {
            width: 100%;
        }

        .advanced-panel {
            position: sticky;
            bottom: 8px;
            z-index: 2;
            box-shadow: var(--shadow);
        }



        .scanner-main-layout {

            grid-template-columns: 1fr;

        }



        .scanner-right {

            position: static;

        }



        .marked-list {

            margin-top: 20px;

        }

    }
</style>

{% endblock %}
