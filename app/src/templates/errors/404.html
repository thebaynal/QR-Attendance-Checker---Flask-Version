{% extends "base.html" %}

{% block title %}Page Not Found - MaScan{% endblock %}

{% block content %}
<div class="error-page">
    <div class="error-card">
        <div class="error-icon">
            <i class="fa-solid fa-map-signs"></i>
        </div>
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>The page you're looking for doesn't exist or has been moved.</p>
        <div class="error-actions">
            <a href="{{ url_for('dashboard.home') }}" class="btn btn-primary">
                <i class="fa-solid fa-house"></i> Go to Dashboard
            </a>
            <a href="javascript:history.back()" class="btn btn-secondary">
                <i class="fa-solid fa-arrow-left"></i> Go Back
            </a>
        </div>
    </div>
</div>

<style>
.error-page {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 60vh;
    padding: 40px 20px;
}

.error-card {
    text-align: center;
    max-width: 480px;
}

.error-icon {
    font-size: 3em;
    color: var(--primary-color);
    margin-bottom: 16px;
    opacity: 0.7;
}

.error-card h1 {
    font-size: 5em;
    font-weight: 800;
    margin: 0;
    background: linear-gradient(135deg, #2563EB 0%, #7C3AED 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
}

.error-card h2 {
    font-size: 1.4em;
    color: var(--text-color);
    margin: 12px 0;
}

.error-card p {
    color: var(--text-secondary);
    margin-bottom: 28px;
}

.error-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
}

.error-actions .btn {
    min-width: 160px;
}
</style>
{% endblock %}
