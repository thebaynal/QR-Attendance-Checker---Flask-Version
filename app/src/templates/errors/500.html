{% extends "base.html" %}

{% block title %}Server Error - MaScan{% endblock %}

{% block content %}
<div class="error-page">
    <div class="error-card">
        <div class="error-icon">
            <i class="fa-solid fa-gear"></i>
        </div>
        <h1>500</h1>
        <h2>Something Went Wrong</h2>
        <p>We encountered an unexpected error. Please try again or contact your administrator.</p>
        <div class="error-actions">
            <a href="{{ url_for('dashboard.home') }}" class="btn btn-primary">
                <i class="fa-solid fa-house"></i> Go to Dashboard
            </a>
            <a href="javascript:location.reload()" class="btn btn-secondary">
                <i class="fa-solid fa-rotate-right"></i> Retry
            </a>
        </div>
    </div>
</div>

<style>
.error-page {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 60vh;
    padding: 40px 20px;
}

.error-card {
    text-align: center;
    max-width: 480px;
}

.error-icon {
    font-size: 3em;
    color: var(--danger-color, #EF4444);
    margin-bottom: 16px;
    opacity: 0.7;
    animation: spin-slow 4s linear infinite;
}

@keyframes spin-slow {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

.error-card h1 {
    font-size: 5em;
    font-weight: 800;
    margin: 0;
    background: linear-gradient(135deg, #EF4444 0%, #F97316 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
}

.error-card h2 {
    font-size: 1.4em;
    color: var(--text-color);
    margin: 12px 0;
}

.error-card p {
    color: var(--text-secondary);
    margin-bottom: 28px;
}

.error-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
}

.error-actions .btn {
    min-width: 160px;
}
</style>
{% endblock %}
