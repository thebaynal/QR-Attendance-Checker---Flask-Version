{% extends "base.html" %}

{% block title %}Login - MaScan{% endblock %}

{% block content %}
<div class="login-container">
    <!-- Floating background elements -->
    <div class="floating-bg floating-bg-1"></div>
    <div class="floating-bg floating-bg-2"></div>
    <div class="floating-bg floating-bg-3"></div>
    
    <div class="login-card">
        <div class="login-header">
            <div class="logo-circle">
                <img src="{{ url_for('static', filename='images/MS_Logo_Blue.ico') }}" alt="Logo" class="logo-img">
            </div>
            <h1>MaScan</h1>
            <p>Attendance Management System</p>
        </div>

        {% if error %}
        <div class="alert alert-danger alert-login">
            <span class="alert-icon"><i class="fa-solid fa-triangle-exclamation" aria-hidden="true"></i></span>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <form method="POST" class="login-form">
            <div class="form-group">
                <label for="username">
                    <span class="label-icon"><i class="fa-regular fa-user" aria-hidden="true"></i></span>
                    Username
                </label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus>
            </div>

            <div class="form-group">
                <label for="password">
                    <span class="label-icon"><i class="fa-solid fa-lock" aria-hidden="true"></i></span>
                    Password
                </label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn btn-primary btn-block">Sign In</button>
        </form>

        <div class="login-footer">
            <p class="text-muted">Demo: <strong>admin</strong> / <strong>Admin@123</strong></p>
        </div>
    </div>
</div>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes float1 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(30px, -50px) scale(1.05); }
}

@keyframes float2 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(-40px, 60px) scale(1.08); }
}

@keyframes float3 {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(-20px, -40px); }
}

.login-container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    width: 100vw;
    padding: 20px;
    background: linear-gradient(135deg, #EEF2FF 0%, #E0E7FF 50%, #F0F4FF 100%);
    position: fixed;
    top: 0;
    left: 0;
    overflow: hidden;
}

html.dark-mode .login-container {
    background: linear-gradient(135deg, #0F172A 0%, #1E1B4B 50%, #0F172A 100%);
}

.floating-bg {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
}

.floating-bg-1 {
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(79, 110, 247, 0.08) 0%, transparent 70%);
    top: -200px;
    right: -100px;
    animation: float1 20s ease-in-out infinite;
}

.floating-bg-2 {
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(124, 92, 252, 0.06) 0%, transparent 70%);
    bottom: -100px;
    left: -100px;
    animation: float2 25s ease-in-out infinite;
}

.floating-bg-3 {
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(6, 182, 212, 0.05) 0%, transparent 70%);
    top: 50%;
    right: 5%;
    animation: float3 30s ease-in-out infinite;
}

.login-card {
    width: 100%;
    max-width: 420px;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 24px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(255, 255, 255, 0.5);
    padding: 48px 44px;
    position: relative;
    z-index: 10;
    animation: fadeIn 0.6s ease-out;
    border: 1px solid rgba(255, 255, 255, 0.6);
}

html.dark-mode .login-card {
    background: rgba(30, 41, 59, 0.92);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35), 0 0 0 1px rgba(255, 255, 255, 0.05);
    border-color: rgba(255, 255, 255, 0.06);
}

.login-header {
    text-align: center;
    margin-bottom: 36px;
}

.logo-circle {
    width: 100px;
    height: 100px;
    margin: 0 auto 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

.logo-circle img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    position: relative;
    z-index: 1;
}

.logo-img {
    filter: drop-shadow(0 4px 12px rgba(79, 110, 247, 0.2));
}

.login-header h1 {
    font-size: 2.2em;
    margin: 8px 0 2px 0;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #4F6EF7 0%, #7C5CFC 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-family: 'Poppins', sans-serif;
}

.login-header p {
    background: linear-gradient(135deg, #4F6EF7 0%, #7C5CFC 60%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin: 2px 0 0 0;
    font-size: 0.9em;
    font-weight: 500;
    font-family: 'Inter', sans-serif;
}

.login-form {
    margin-bottom: 28px;
}

.form-group {
    margin-bottom: 22px;
    position: relative;
}

.form-group label {
    display: flex;
    align-items: center;
    margin-bottom: 8px;
    font-weight: 600;
    color: var(--text-color, #1E293B);
    font-size: 0.9em;
}

html.dark-mode .form-group label {
    color: #E2E8F0;
}

.label-icon {
    margin-right: 8px;
    font-size: 0.95em;
    width: 16px;
    display: inline-flex;
    justify-content: center;
    opacity: 0.7;
}

.form-group input {
    width: 100%;
    padding: 13px 16px;
    border: 1.5px solid #E2E8F0;
    border-radius: 12px;
    font-size: 0.95em;
    font-family: inherit;
    transition: all 0.25s cubic-bezier(.4,0,.2,1);
    background-color: #F8FAFC;
    color: #1E293B;
}

html.dark-mode .form-group input {
    background-color: #1E293B;
    border-color: #334155;
    color: #E2E8F0;
}

.form-group input::placeholder {
    color: #94A3B8;
}

.form-group input:focus {
    outline: none;
    border-color: #4F6EF7;
    background-color: #fff;
    box-shadow: 0 0 0 4px rgba(79, 110, 247, 0.1);
}

html.dark-mode .form-group input:focus {
    background-color: #263548;
    box-shadow: 0 0 0 4px rgba(109, 140, 255, 0.15);
}

.alert-login {
    background: rgba(239, 68, 68, 0.06);
    border: 1.5px solid rgba(239, 68, 68, 0.2);
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.9em;
    color: #EF4444;
    animation: fadeIn 0.3s ease-out;
}

.alert-icon {
    font-size: 1em;
    width: 18px;
    display: inline-flex;
    justify-content: center;
    flex-shrink: 0;
}

.btn-primary {
    background: linear-gradient(135deg, #4F6EF7 0%, #7C5CFC 100%);
    color: white;
    border: none;
    font-size: 0.95rem;
    font-weight: 700;
    transition: all 0.25s cubic-bezier(.4,0,.2,1);
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(79, 110, 247, 0.3);
    letter-spacing: 0.3px;
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(79, 110, 247, 0.4);
    filter: brightness(1.06);
}

.btn-primary:active {
    transform: translateY(0);
    box-shadow: 0 2px 10px rgba(79, 110, 247, 0.25);
}

.btn-block {
    width: 100%;
    padding: 14px 16px;
    font-size: 0.95em;
    margin-top: 8px;
    border-radius: 12px;
}

.login-footer {
    text-align: center;
    padding-top: 20px;
    border-top: 1.5px solid var(--border-color, #E2E8F0);
}

html.dark-mode .login-footer {
    border-top-color: #334155;
}

.login-footer .text-muted {
    font-size: 0.82em;
    color: #94A3B8;
    margin: 0;
    line-height: 1.6;
}

.login-footer strong {
    color: #4F6EF7;
    font-weight: 700;
}

@media (max-width: 480px) {
    .login-card {
        padding: 36px 28px;
        border-radius: 20px;
    }
    .login-header h1 { font-size: 1.8em; }
    .logo-circle { width: 80px; height: 80px; margin-bottom: 12px; }
    .form-group input { padding: 12px 14px; font-size: 16px; }
    .floating-bg-1 { width: 300px; height: 300px; }
    .floating-bg-2 { width: 250px; height: 250px; }
    .floating-bg-3 { width: 200px; height: 200px; }
}
</style>
{% endblock %}
