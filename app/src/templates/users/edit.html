{% extends "base.html" %}

{% block title %}Edit User - MaScan{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-header">
        <h1>Edit User</h1>
        <p>{{ target_user[0] }}</p>
    </div>

    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="POST" class="form">
        <div class="form-group">
            <label>Username</label>
            <input type="text" value="{{ target_user[0] }}" disabled>
        </div>

        <div class="form-group">
            <label for="full_name">Full Name *</label>
            <input type="text" id="full_name" name="full_name" value="{{ target_user[1] }}" required>
        </div>

        <div class="form-group">
            <label for="role">Role *</label>
            <select id="role" name="role" required>
                <option value="scanner" {% if target_user[2] == 'scanner' %}selected{% endif %}>Scanner</option>
                <option value="admin" {% if target_user[2] == 'admin' %}selected{% endif %}>Admin</option>
            </select>
        </div>

        <div class="form-group">
            <label for="password">New Password (leave empty to keep current)</label>
            <input type="password" id="password" name="password" placeholder="Leave empty to keep current password">
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{{ url_for('user.list_users') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>

<style>
.form-container {
    max-width: 600px;
    margin: 0 auto;
    background: white;
    padding: 30px;
    border-radius: 8px;
}

.form-header {
    margin-bottom: 30px;
}

.form-header h1 {
    margin: 0 0 10px 0;
}

.form-header p {
    margin: 0;
    color: #666;
}

.form {
    display: flex;
    flex-direction: column;
}

.form-group {
    margin-bottom: 20px;
    display: flex;
    flex-direction: column;
}

.form-group label {
    margin-bottom: 8px;
    font-weight: 600;
    color: #333;
}

.form-group input,
.form-group select {
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-size: 1em;
    font-family: inherit;
}

.form-group input:disabled {
    background: #f5f5f5;
    cursor: not-allowed;
}

.form-group input:focus,
.form-group select:focus {
    outline: none;
    border-color: #2A73FF;
    box-shadow: 0 0 0 3px rgba(42, 115, 255, 0.1);
}

.form-actions {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

.form-actions .btn {
    flex: 1;
}
</style>
{% endblock %}
