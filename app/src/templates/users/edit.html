{% extends "base.html" %}

{% block title %}Edit User - MaScan{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-header">
        <h1>Edit User</h1>
        <p>{{ target_user[0] }}</p>
    </div>

    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="POST" class="form">
        <div class="form-group">
            <label>Username</label>
            <input type="text" value="{{ target_user[0] }}" disabled>
        </div>

        <div class="form-group">
            <label for="full_name">Full Name *</label>
            <input type="text" id="full_name" name="full_name" value="{{ target_user[1] }}" required>
        </div>

        <div class="form-group">
            <label for="role">Role *</label>
            <select id="role" name="role" required>
                <option value="scanner" {% if target_user[2] == 'scanner' %}selected{% endif %}>Scanner</option>
                <option value="admin" {% if target_user[2] == 'admin' %}selected{% endif %}>Admin</option>
            </select>
        </div>

        <div class="form-group">
            <label for="password">New Password (leave empty to keep current)</label>
            <input type="password" id="password" name="password" placeholder="Leave empty to keep current password">
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{{ url_for('user.list_users') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>

<style>
.form-container {
    max-width: 600px;
    margin: 0 auto;
    background: var(--card-bg);
    padding: 36px;
    border-radius: var(--border-radius-lg);
    border: 1px solid var(--border-color);
    box-shadow: var(--shadow);
}

.form-header {
    margin-bottom: 32px;
}

.form-header h1 {
    margin: 0 0 8px 0;
    font-size: 1.6em;
    font-weight: 700;
    background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.form-header p {
    margin: 0;
    color: var(--text-secondary);
}

.form {
    display: flex;
    flex-direction: column;
}

.form-group {
    margin-bottom: 22px;
    display: flex;
    flex-direction: column;
}

.form-group label {
    margin-bottom: 8px;
    font-weight: 600;
    color: var(--text-color);
    font-size: 0.9em;
}

.form-group input,
.form-group select {
    padding: 11px 14px;
    border: 1.5px solid var(--input-border);
    border-radius: var(--border-radius);
    font-size: 0.95em;
    font-family: inherit;
    background: var(--input-bg);
    color: var(--text-color);
    transition: var(--transition);
}

.form-group input:disabled {
    background: var(--bg-color);
    cursor: not-allowed;
    opacity: 0.7;
}

.form-group input:focus,
.form-group select:focus {
    outline: none;
    border-color: var(--primary-color);
    box-shadow: var(--focus-ring);
}

.form-group input::placeholder {
    color: var(--text-secondary);
    opacity: 0.6;
}

.form-actions {
    display: flex;
    gap: 12px;
    margin-top: 12px;
}

.form-actions .btn {
    flex: 1;
}

@media (max-width: 600px) {
    .form-container { padding: 24px; }
    .form-actions { flex-direction: column; }
}
</style>
{% endblock %}
