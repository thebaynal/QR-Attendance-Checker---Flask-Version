{% extends "base.html" %}

{% block title %}Create User - MaScan{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-header">
        <h1>Create User</h1>
        <p>Add a new user to the system</p>
    </div>

    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="POST" class="form">
        <div class="form-group">
            <label for="username">Username *</label>
            <input type="text" id="username" name="username" required placeholder="username" maxlength="50" minlength="3" pattern="[a-zA-Z0-9_]+" title="Only letters, numbers, and underscores">
        </div>

        <div class="form-group">
            <label for="password">Password *</label>
            <input type="password" id="password" name="password" required placeholder="Enter password" minlength="6">
            <div class="password-strength" id="passwordStrength" style="display: none;">
                <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
                <span class="strength-text" id="strengthText"></span>
            </div>
        </div>

        <div class="form-group">
            <label for="full_name">Full Name *</label>
            <input type="text" id="full_name" name="full_name" required placeholder="e.g., John Doe" maxlength="100" minlength="2">
        </div>

        <div class="form-group">
            <label for="role">Role *</label>
            <select id="role" name="role" required>
                <option value="scanner">Scanner (Can only scan QR codes)</option>
                <option value="admin">Admin (Full access)</option>
            </select>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Create User</button>
            <a href="{{ url_for('user.list_users') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>

<style>
.form-container {
    max-width: 600px;
    margin: 0 auto;
    background: var(--card-bg);
    padding: 36px;
    border-radius: var(--border-radius-lg);
    border: 1px solid var(--border-color);
    box-shadow: var(--shadow);
}

.form-header {
    margin-bottom: 32px;
}

.form-header h1 {
    margin: 0 0 8px 0;
    font-size: 1.6em;
    font-weight: 700;
    background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.form-header p {
    margin: 0;
    color: var(--text-secondary);
}

.form {
    display: flex;
    flex-direction: column;
}

.form-group {
    margin-bottom: 22px;
    display: flex;
    flex-direction: column;
}

.form-group label {
    margin-bottom: 8px;
    font-weight: 600;
    color: var(--text-color);
    font-size: 0.9em;
}

.form-group input,
.form-group select {
    padding: 11px 14px;
    border: 1.5px solid var(--input-border);
    border-radius: var(--border-radius);
    font-size: 0.95em;
    font-family: inherit;
    background: var(--input-bg);
    color: var(--text-color);
    transition: var(--transition);
}

.form-group input:focus,
.form-group select:focus {
    outline: none;
    border-color: var(--primary-color);
    box-shadow: var(--focus-ring);
}

.form-group input::placeholder {
    color: var(--text-secondary);
    opacity: 0.6;
}

.form-actions {
    display: flex;
    gap: 12px;
    margin-top: 12px;
}

.form-actions .btn {
    flex: 1;
}

.password-strength {
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.strength-bar {
    flex: 1;
    height: 4px;
    background: var(--border-color);
    border-radius: 99px;
    overflow: hidden;
}

.strength-fill {
    height: 100%;
    width: 0;
    border-radius: 99px;
    transition: all 0.3s ease;
}

.strength-text {
    font-size: 0.75em;
    font-weight: 600;
    white-space: nowrap;
}

@media (max-width: 600px) {
    .form-container { padding: 24px; }
    .form-actions { flex-direction: column; }
}
</style>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.querySelector('.form');
    if (form) {
        form.addEventListener('submit', function() {
            const btn = form.querySelector('button[type="submit"]');
            if (btn) {
                btn.disabled = true;
                btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Creating...';
            }
        });
    }

    // Password strength meter
    const pwInput = document.getElementById('password');
    const strengthDiv = document.getElementById('passwordStrength');
    const strengthFill = document.getElementById('strengthFill');
    const strengthText = document.getElementById('strengthText');

    if (pwInput && strengthDiv) {
        pwInput.addEventListener('input', function() {
            const val = this.value;
            if (val.length === 0) { strengthDiv.style.display = 'none'; return; }
            strengthDiv.style.display = 'flex';

            let score = 0;
            if (val.length >= 6) score++;
            if (val.length >= 10) score++;
            if (/[A-Z]/.test(val)) score++;
            if (/[0-9]/.test(val)) score++;
            if (/[^A-Za-z0-9]/.test(val)) score++;

            const levels = [
                { width: '20%', color: '#EF4444', text: 'Very Weak' },
                { width: '40%', color: '#F59E0B', text: 'Weak' },
                { width: '60%', color: '#F59E0B', text: 'Fair' },
                { width: '80%', color: '#10B981', text: 'Strong' },
                { width: '100%', color: '#10B981', text: 'Very Strong' }
            ];
            const level = levels[Math.min(score, 4)];
            strengthFill.style.width = level.width;
            strengthFill.style.background = level.color;
            strengthText.textContent = level.text;
            strengthText.style.color = level.color;
        });
    }
});
</script>
{% endblock %}
